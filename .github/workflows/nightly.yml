# Create nightly release for Linux, Mac and Windows.
# Builds native JNI libraries for each platform, then packages with Gradle.
name: Nightly Release

on:
  workflow_dispatch:

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  # ============================================================
  # Build native JNI libraries for each platform
  # ============================================================
  build-native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            lib_glob: "*.so"
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            lib_glob: "*.so"
          - os: macos-latest
            target: osx-aarch64
            lib_glob: "*.dylib"
          - os: macos-15-intel
            target: osx-x86_64
            lib_glob: "*.dylib"
          - os: windows-latest
            target: windows-x86_64
            lib_glob: "*.dll"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (for JNI headers)
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev ninja-build

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install libusb ninja

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install build dependencies (Windows)
        if: runner.os == 'Windows'
        run: choco install -y ninja
        shell: pwsh

      # Workaround for libhydrasdr's CMakeLists.txt bug on Windows: it downloads
      # libusb-1.0.29.7z and extracts it via `cmake -E tar`, which cannot decode
      # LZMA2. Pre-extract with 7z.exe (preinstalled on windows-latest) into the
      # path libhydrasdr's FetchContent expects.
      - name: Pre-extract libusb for Windows
        if: runner.os == 'Windows'
        run: |
          # See gradle.yml for full explanation. Short version: libhydrasdr's
          # CMakeLists fetches libusb-1.0.29.7z and extracts via cmake -E tar,
          # which can't decode LZMA2. Pre-extract here with 7z.exe.
          $libusbDir = "jni/build/_deps/libusb-1.0.29"
          New-Item -ItemType Directory -Force -Path $libusbDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/libusb/libusb/releases/download/v1.0.29/libusb-1.0.29.7z" -OutFile "libusb.7z"
          & "C:\Program Files\7-Zip\7z.exe" x libusb.7z -o"$libusbDir" -y
          if (-not (Test-Path "$libusbDir/VS2022/MS64/dll/libusb-1.0.dll")) {
            Write-Error "libusb pre-extraction failed: expected DLL not found"
            exit 1
          }
          Remove-Item libusb.7z
        shell: pwsh

      - name: Build HydraSDR JNI native library
        run: |
          mkdir -p jni/build
          cd jni/build
          cmake ../ -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release
        shell: bash

      - name: Upload native libraries
        uses: actions/upload-artifact@v4
        with:
          name: hydrasdr-native-${{ matrix.target }}
          path: |
            jni/build/${{ matrix.lib_glob }}
          retention-days: 1

  # ============================================================
  # Package releases with Gradle
  # ============================================================
  nightly:
    needs: build-native
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      # Download all native library artifacts
      - name: Download native libs (linux-x86_64)
        uses: actions/download-artifact@v4
        with:
          name: hydrasdr-native-linux-x86_64
          path: native/linux-x86_64

      - name: Download native libs (linux-aarch64)
        uses: actions/download-artifact@v4
        with:
          name: hydrasdr-native-linux-aarch64
          path: native/linux-aarch64
        continue-on-error: true

      - name: Download native libs (osx-aarch64)
        uses: actions/download-artifact@v4
        with:
          name: hydrasdr-native-osx-aarch64
          path: native/osx-aarch64

      - name: Download native libs (osx-x86_64)
        uses: actions/download-artifact@v4
        with:
          name: hydrasdr-native-osx-x86_64
          path: native/osx-x86_64

      - name: Download native libs (windows-x86_64)
        uses: actions/download-artifact@v4
        with:
          name: hydrasdr-native-windows-x86_64
          path: native/windows-x86_64

      # Build local JNI (needed for gradle compile on Linux)
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev ninja-build

      - name: Build local JNI
        run: |
          mkdir -p jni/build
          cd jni/build
          cmake ../ -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - name: Build Linux and Mac releases with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipOthers -PprojectVersion=nightly

      - name: Build Windows release with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: runtimeZipWindows -PprojectVersion=nightly

      # Inject platform-specific native libs into release zips
      - name: Inject native libraries into release packages
        run: |
          cd build/image
          for zip in *.zip; do
            echo "Processing $zip"
            # Order matters: match aarch64 BEFORE x86_64 (the prefix is shared)
            if   [[ "$zip" == *"linux-aarch64"*   ]]; then dir="linux-aarch64"
            elif [[ "$zip" == *"linux-x86_64"*    ]]; then dir="linux-x86_64"
            elif [[ "$zip" == *"osx-aarch64"*     ]]; then dir="osx-aarch64"
            elif [[ "$zip" == *"osx-x86_64"*      ]]; then dir="osx-x86_64"
            elif [[ "$zip" == *"windows-x86_64"*  ]]; then dir="windows-x86_64"
            else echo "  Skipping: $zip"; continue; fi

            native_dir="../../native/$dir"
            if [ -d "$native_dir" ] && [ "$(ls -A $native_dir 2>/dev/null)" ]; then
              # Extract top-level directory name from zip (robust: find first directory entry)
              top_dir=$(unzip -l "$zip" | grep '/$' | head -1 | awk '{print $NF}' | cut -d/ -f1)
              if [ -z "$top_dir" ]; then
                echo "  ERROR: Could not determine top-level dir in $zip"
                continue
              fi
              mkdir -p "/tmp/inject/$top_dir/lib/native"
              cp "$native_dir"/* "/tmp/inject/$top_dir/lib/native/"
              cd /tmp/inject && zip -r "$OLDPWD/$zip" "$top_dir/lib/native/" && cd "$OLDPWD"
              rm -rf /tmp/inject
              echo "  Injected native libs from $dir into $top_dir/lib/native/"
            else
              echo "  No native libs for $dir"
            fi
          done
        shell: bash

      - name: Create Build Info file
        run: |
          echo -e "ref: $GITHUB_REF \ncommit: $GITHUB_SHA\nbuild: $(date +"%Y-%m-%dT%H:%M:%SZ")" > build/image/build_info.txt

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          body: |
            Nightly build of the **master** branch — buns-eastern fork of sdrtrunk.

            ## Which build do I want?

            | Build | Get it if... |
            |---|---|
            | **Nightly Build** (this one) | You monitor digital systems (P25 / DMR) and want the streaming + diagnostics extras below. |
            | **Nightly Build (nbfm-filters)** | Everything here **plus** the analog NBFM suite: per-channel audio filter pipeline, CTCSS/DCS tone squelch, squelch tail removal. Get that one if you listen to analog FM channels. |

            ## What this fork adds over stock sdrtrunk

            **TCP streaming suite** (Preferences > Network) for feeding external apps:
            - Port 9500 — decode events  ·  9501 — raw control channel messages  ·  9502 — raw IMBE frames  ·  9503 — decoded PCM call audio with call metadata (NDJSON)
            - All listeners open at app startup (no waiting for a channel to start); the PCM stream sends an idle heartbeat every ~5s so clients can tell quiet air from a dead socket

            **Channel tab diagnostics** (click a channel in Now Playing > Channel tab):
            - dBFS amplitude reference grid on the channel spectrum
            - Live symbol-quality meter (EVM) with GOOD/FAIR/POOR zone bar and explanatory tooltip
            - Measured BER readout for P25 Phase 1, P25 Phase 2 and DMR, with SYNC/NO SYNC state

            **Tuner / decoder improvements:**
            - Auto-PPM now works with analog **NBFM** channels (carrier-offset measurement, same mechanism as DMR) — a steady analog carrier keeps the tuner disciplined without any digital channel running
            - NBFM audio dropout fix (resampler input chunking)

            **HydraSDR RFOne support** — native JNI bridge to libhydrasdr v1.1.x (~25x lower streaming CPU vs the pure-Java USB path) with USB disconnect detection.

            ## Install notes

            - **Windows:** zips are self-contained — unzip and run.
            - **macOS:** `brew install libusb` (HydraSDR libs are bundled).
            - **Linux:** HydraSDR owners must install libhydrasdr + libusb-1.0 — prebuilt distro packages: https://github.com/hydrasdr/hydrasdr-host/releases/tag/nightly — non-HydraSDR users only need libusb-1.0.

            ## Credits

            - **Dennis Sheirer** — sdrtrunk itself, the foundation of everything here: https://github.com/DSheirer/sdrtrunk
            - **Benjamin Vernoux** (@bvernoux) — native JNI bridge to libhydrasdr / HydraSDR support: https://github.com/DSheirer/sdrtrunk/pull/2403
            - **actionpagezello** — the NBFM audio filter pipeline, CTCSS/DCS tone squelch, and squelch tail removal in the nbfm-filters build: https://github.com/actionpagezello/sdrtrunk
            - **TPSSCW** — original NBFM audio filter concept (SDRTrunk-Pro): https://github.com/TPSSCW/SDRTrunk-Pro

            See `build_info.txt` for the exact commit and build timestamp.
          files: |
            build/image/*.zip
            build/image/build_info.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
